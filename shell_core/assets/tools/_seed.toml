# Seed manifest — consumed by seed_from_assets() in db_init.py.
# Each *.md in this directory is one `tools` row: frontmatter keys map
# 1:1 to columns, the JSON body becomes `spec` (validated at seed time).
#
# kind / handler vary per tool — they live in each file's frontmatter,
# not in a [const] block. status is omitted: it falls to the schema
# default ('active'). See the asset_seeding skill for the full convention.
table       = "tools"
match       = "name"
body        = "spec"
body_format = "json"

# ── skill scoping ────────────────────────────────────────────────────────────
# Consumed by seed_tools() in db_init.py, not the generic seeder. Two key
# shapes:
#   • bare name (no dot) — handler-family prefix. A tool whose handler starts
#     "<key>." is scoped to that skill. Use when one skill carries the whole
#     family (file.*, proc.*, net.*, shared).
#   • dotted name — exact handler match. Use when one family splits across
#     skills (flag.create → create_flag skill; flag.resolve → resolve_flag
#     skill). Exact entries take precedence in the lookup.
# A tool whose handler matches nothing here stays general (skill_id NULL —
# the api_* verbs). Adding a tool family is a line here — no code change.
[skill_map]
file           = "file-ops"
proc           = "process-exec"
net            = "web-fetch"
shared         = "shared"
"flag.create"     = "create_flag"
"flag.resolve"    = "resolve_flag"
"identity.create" = "create_identity_entry"
"decision.create" = "decision"
